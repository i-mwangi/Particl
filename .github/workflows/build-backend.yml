name: Build backend image

# Builds backend/Dockerfile (FastAPI + TeX Live) and pushes it to Alibaba Cloud
# Container Registry (ACR), so the ECS instance can pull it. Runs on backend
# changes or manually from the Actions tab.
#
# Requires four repository secrets (Settings -> Secrets and variables -> Actions):
#   ACR_REGISTRY  - e.g. registry-intl.ap-southeast-1.aliyuncs.com
#   ACR_NAMESPACE - the ACR namespace you created
#   ACR_USERNAME  - the ACR credential username
#   ACR_PASSWORD  - the ACR credential password (or an access token)
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/build-backend.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/particl-backend:latest
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/particl-backend:${{ github.sha }}
