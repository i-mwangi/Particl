name: Build backend image

# Builds backend/Dockerfile (FastAPI + TeX Live) and pushes it to the GitHub
# Container Registry. The Azure App Service deployment pulls this image.
#
# Also tags each build with the commit SHA so a deployment can be pinned to an
# immutable digest (App Service caches the :latest tag and will not reliably
# re-pull it on restart).
#
# The Alibaba Cloud ECS deployment does NOT use this workflow - it builds the
# image directly on the VM via `git pull` + `docker build`.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/build-backend.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/i-mwangi/particl-backend:latest
            ghcr.io/i-mwangi/particl-backend:${{ github.sha }}
